[build]
publish = "."
command = "npm install"

[build.environment]
NODE_VERSION = "18"

# SPA fallback
[[redirects]]
from = "/*"
to = "/index.html"
status = 200

# Global caching
[[headers]]
for = "/*"
[headers.values]
Cache-Control = "public, max-age=3600"
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# JS files
[[headers]]
for = "/*.js"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# Tensorflow models
[[headers]]
for = "/**/*.json"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/**/*.bin"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# HTML should not be cached too aggressively
[[headers]]
for = "/*.html"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"
